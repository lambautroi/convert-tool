<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chuyển ảnh sang PDF - ConvertTool</title>
  <meta name="description" content="Chuyển đổi ảnh JPG, PNG, WebP sang file PDF miễn phí, xử lý trực tiếp trên trình duyệt." />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="tool-header">
    <div class="container">
      <a href="../index.html" class="back-link">← Về trang chủ</a>
      <span class="tool-header-title">🖼️ Ảnh → PDF</span>
    </div>
  </header>

  <main class="tool-main">
    <div class="container">
      <div class="tool-title-block">
        <h1>Chuyển ảnh sang PDF</h1>
        <p>Hỗ trợ JPG, PNG, WebP. Kéo thả để sắp xếp thứ tự trang.</p>
      </div>

      <!-- Drop zone -->
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">🖼️</div>
        <h3>Kéo thả ảnh vào đây</h3>
        <p>hoặc nhấn để chọn file (JPG, PNG, WebP)</p>
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Chọn ảnh</button>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple hidden />
      </div>

      <!-- Options -->
      <div class="options-row" id="optionsRow" style="display:none">
        <label>Kích thước trang:</label>
        <select id="pageSize">
          <option value="A4">A4</option>
          <option value="A3">A3</option>
          <option value="Letter">Letter</option>
          <option value="fit">Khớp với ảnh</option>
        </select>
        <label>Hướng trang:</label>
        <select id="orientation">
          <option value="portrait">Dọc</option>
          <option value="landscape">Ngang</option>
        </select>
        <label>Chất lượng:</label>
        <select id="quality">
          <option value="0.95">Cao</option>
          <option value="0.8">Trung bình</option>
          <option value="0.6">Thấp</option>
        </select>
      </div>

      <!-- File list -->
      <div class="file-list" id="fileList"></div>

      <!-- Progress -->
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
        <div class="progress-label" id="progressLabel">Đang xử lý...</div>
      </div>

      <!-- Action bar -->
      <div class="action-bar" id="actionBar" style="display:none">
        <div class="action-bar-left">
          <button class="btn btn-secondary" onclick="clearAll()">Xóa tất cả</button>
          <span id="fileCount" style="font-size:0.9rem;color:var(--text-muted)"></span>
        </div>
        <button class="btn btn-success" id="convertBtn" onclick="convertToPDF()">⬇ Tạo PDF</button>
      </div>

      <!-- Result -->
      <div class="result-section" id="resultSection">
        <div class="result-icon">✅</div>
        <h3>Tạo PDF thành công!</h3>
        <p id="resultDesc"></p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-success" id="downloadBtn">⬇ Tải xuống PDF</button>
          <button class="btn btn-secondary" onclick="clearAll()">Chuyển đổi tiếp</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>© 2026 ConvertTool · Xử lý file trực tiếp trên trình duyệt</p></div>
  </footer>

  <div class="toast" id="toast"></div>

  <!-- pdf-lib CDN -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script>
    const { PDFDocument } = PDFLib;

    let files = []; // { file, url, name, size }

    const dropZone    = document.getElementById('dropZone');
    const fileInput   = document.getElementById('fileInput');
    const fileListEl  = document.getElementById('fileList');
    const actionBar   = document.getElementById('actionBar');
    const optionsRow  = document.getElementById('optionsRow');
    const fileCountEl = document.getElementById('fileCount');
    const progressWrap= document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressLabel=document.getElementById('progressLabel');
    const resultSection=document.getElementById('resultSection');
    const resultDesc  = document.getElementById('resultDesc');
    const convertBtn  = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    // Drag & drop
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      addFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener('change', () => addFiles([...fileInput.files]));

    function addFiles(newFiles) {
      const valid = newFiles.filter(f => /image\/(jpeg|png|webp)/.test(f.type));
      if (valid.length !== newFiles.length) showToast('Bỏ qua file không hỗ trợ (chỉ JPG, PNG, WebP)', 'error');
      valid.forEach(f => {
        const url = URL.createObjectURL(f);
        files.push({ file: f, url, name: f.name, size: f.size });
      });
      renderList();
      fileInput.value = '';
    }

    function renderList() {
      if (files.length === 0) {
        fileListEl.innerHTML = '';
        actionBar.style.display = 'none';
        optionsRow.style.display = 'none';
        resultSection.classList.remove('active');
        return;
      }
      actionBar.style.display = 'flex';
      optionsRow.style.display = 'flex';
      fileCountEl.textContent = `${files.length} ảnh`;

      fileListEl.innerHTML = files.map((f, i) => `
        <div class="file-item" draggable="true" data-index="${i}"
          ondragstart="dragStart(event,${i})" ondragover="dragOver(event,${i})"
          ondragend="dragEnd(event)">
          <span class="drag-handle">⠿</span>
          <img class="file-thumb" src="${f.url}" alt="${f.name}" />
          <div class="file-info">
            <div class="file-name">${f.name}</div>
            <div class="file-size">${formatSize(f.size)} · Trang ${i + 1}</div>
          </div>
          <button class="btn btn-danger" onclick="removeFile(${i})">✕</button>
        </div>
      `).join('');
    }

    // Drag reorder
    let dragIdx = null;
    function dragStart(e, i) { dragIdx = i; e.currentTarget.classList.add('dragging'); }
    function dragOver(e, i) {
      e.preventDefault();
      if (dragIdx === null || dragIdx === i) return;
      const moved = files.splice(dragIdx, 1)[0];
      files.splice(i, 0, moved);
      dragIdx = i;
      renderList();
    }
    function dragEnd(e) { dragIdx = null; e.currentTarget && e.currentTarget.classList.remove('dragging'); }

    function removeFile(i) { URL.revokeObjectURL(files[i].url); files.splice(i, 1); renderList(); }
    function clearAll() { files.forEach(f => URL.revokeObjectURL(f.url)); files = []; renderList(); progressWrap.classList.remove('active'); }

    async function convertToPDF() {
      if (files.length === 0) return;
      convertBtn.disabled = true;
      resultSection.classList.remove('active');
      progressWrap.classList.add('active');
      setProgress(0, 'Đang khởi tạo PDF...');

      const pageSize = document.getElementById('pageSize').value;
      const orientation = document.getElementById('orientation').value;
      const quality = parseFloat(document.getElementById('quality').value);

      const PAGE_SIZES = {
        A4: [595.28, 841.89], A3: [841.89, 1190.55],
        Letter: [612, 792], fit: null
      };

      try {
        const pdfDoc = await PDFDocument.create();

        for (let i = 0; i < files.length; i++) {
          setProgress(Math.round((i / files.length) * 85), `Đang xử lý ảnh ${i + 1}/${files.length}...`);

          const imgData = await readFileAsDataURL(files[i].file, quality);
          const isJpeg = /jpeg|jpg/.test(files[i].file.type) || quality < 1;

          let embeddedImg;
          if (isJpeg) {
            const compressed = await compressImage(files[i].url, quality);
            embeddedImg = await pdfDoc.embedJpg(compressed);
          } else {
            const bytes = await files[i].file.arrayBuffer();
            embeddedImg = await pdfDoc.embedPng(new Uint8Array(bytes));
          }

          let [pw, ph] = PAGE_SIZES[pageSize] || [embeddedImg.width, embeddedImg.height];
          if (pageSize === 'fit') { pw = embeddedImg.width; ph = embeddedImg.height; }
          if (orientation === 'landscape' && pageSize !== 'fit') [pw, ph] = [ph, pw];

          const page = pdfDoc.addPage([pw, ph]);
          const scale = Math.min(pw / embeddedImg.width, ph / embeddedImg.height);
          const w = embeddedImg.width * scale;
          const h = embeddedImg.height * scale;
          page.drawImage(embeddedImg, { x: (pw - w) / 2, y: (ph - h) / 2, width: w, height: h });
        }

        setProgress(95, 'Đang lưu file...');
        const pdfBytes = await pdfDoc.save();
        setProgress(100, 'Hoàn thành!');

        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const dlUrl = URL.createObjectURL(blob);

        downloadBtn.onclick = () => {
          const a = document.createElement('a');
          a.href = dlUrl; a.download = 'converted.pdf'; a.click();
        };

        resultDesc.textContent = `${files.length} ảnh · ${formatSize(pdfBytes.byteLength)}`;
        resultSection.classList.add('active');
        showToast('Tạo PDF thành công!', 'success');
      } catch (err) {
        console.error(err);
        showToast('Lỗi khi tạo PDF: ' + err.message, 'error');
      } finally {
        convertBtn.disabled = false;
        setTimeout(() => progressWrap.classList.remove('active'), 1500);
      }
    }

    function readFileAsDataURL(file, quality) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    function compressImage(src, quality) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          canvas.getContext('2d').drawImage(img, 0, 0);
          canvas.toBlob(blob => {
            blob.arrayBuffer().then(buf => resolve(new Uint8Array(buf)));
          }, 'image/jpeg', quality);
        };
        img.onerror = reject;
        img.src = src;
      });
    }

    function setProgress(pct, label) {
      progressBar.style.width = pct + '%';
      progressLabel.textContent = label;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(2) + ' MB';
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (type ? ' ' + type : '');
      setTimeout(() => t.className = 'toast', 3000);
    }
  </script>
</body>
</html>
